<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CmdCLD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: system-ui, sans-serif; }

    /* Thin, auto-hide scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    ::-webkit-scrollbar-corner {
      background: transparent;
    }

    /* xterm scrollbar override */
    .xterm-viewport::-webkit-scrollbar {
      width: 6px;
    }
    .xterm-viewport::-webkit-scrollbar-track {
      background: transparent;
    }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 3px;
    }
    .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* Hide scrollbar until hover/scroll */
    .xterm-viewport {
      scrollbar-gutter: stable;
    }

    /* Markdown viewer styles */
    .markdown-body {
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
    .markdown-body h1 { font-size: 1.8em; color: #e0e0e0; border-bottom: 1px solid #333; padding-bottom: 8px; margin: 20px 0 12px; }
    .markdown-body h2 { font-size: 1.4em; color: #e0e0e0; border-bottom: 1px solid #2d2d2d; padding-bottom: 6px; margin: 18px 0 10px; }
    .markdown-body h3 { font-size: 1.2em; color: #e0e0e0; margin: 16px 0 8px; }
    .markdown-body h4, .markdown-body h5, .markdown-body h6 { color: #d0d0d0; margin: 12px 0 6px; }
    .markdown-body p { margin: 0 0 12px; }
    .markdown-body a { color: #3b8eea; text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body code {
      background: #2d2d2d;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: Cascadia Code, Consolas, monospace;
      font-size: 0.9em;
      color: #e5e5e5;
    }
    .markdown-body pre {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 0 0 12px;
    }
    .markdown-body pre code {
      background: none;
      padding: 0;
      font-size: 13px;
    }
    .markdown-body blockquote {
      border-left: 3px solid #444;
      padding-left: 16px;
      color: #999;
      margin: 0 0 12px;
    }
    .markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 0 0 12px; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin: 0 0 12px; }
    .markdown-body th, .markdown-body td { border: 1px solid #333; padding: 6px 12px; text-align: left; }
    .markdown-body th { background: #252526; color: #e0e0e0; }
    .markdown-body hr { border: none; border-top: 1px solid #333; margin: 16px 0; }
    .markdown-body img { max-width: 100%; border-radius: 4px; }

    /* Terminal busy indicator pulse */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
